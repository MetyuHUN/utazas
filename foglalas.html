  <div class="container">

    <div class="foglalas-kartya">

      <h2 class="foglalas-cim">Utazas Foglalas</h2>

      <form id="foglalasiForm">

        <!-- Helyszin -->
        <div class="mb-3">
          <label class="form-label">Helyszin</label>

          <select class="form-select" id="helyszin" required>
            <option value="">Valassz helyszint</option>
            <option value="50000">Németország - 50 000 Ft</option>
            <option value="80000">Franciaország - 80 000 Ft</option>
            <option value="120000">Egyiptom - 120 000 Ft</option>
            <option value="150000">Thaiföld - 150 000 Ft</option>
          </select>
        </div>

         <!--ido -->
        <div class="mb-3">
          <label class="form-label">Idopont</label>

          <input type="datetime-local" class="form-control" id="idopont" required>
        </div>

        <!-- Szemelyek-->
        <div class="mb-4">
          <label class="form-label">Szemelyek szama</label>

          <input type="number" class="form-control" id="szemelyekSzama" min="1" value="1" required>
        </div>
