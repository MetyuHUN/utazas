      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
        aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link " href="fooldal.html">Fő oldal</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="lista.html">Utazások listája</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="foglalas.html">Foglalj itt!</a>
          </li>
          <li class="nav-item">

          </li>
        </ul>
        <span class="navbar-text">

        </span>
      </div>
    </div>
  </nav>

  <div class="bg-danger">
    <header class="text-center h2 p-3 container-fluid  text-light mt-5">VELORA UTAZÁSI IRODA</header>
    <h5 class="text-center h5 p-2 container-fluid  text-light mt-4">ADMIN</h5>
  </div>
  </div>
  <div class="text-center">
  </div>
  <div class="container mt-5 ">
    <div class="row d-flex align-items-center justify-content-center gap-4 ">
      <div class="col-lg-7 col-md-12 rounded bg-light border border-danger border-2">
        <table class="container-fluid mt-3 mb-3" id="tablaFoglalas">
          <thead>
            <tr>
              <th>Név:</th>
              <th>Helyszín:</th>
              <th>Időpont:</th>
              <th>Személyek száma:</th>
              <th>Végösszeg:</th>
              <th>Törlés</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const adatok = JSON.parse(localStorage.getItem("foglas")) || [];
      const tablaBody = document.getElementById("tablaBody");

      function renderTabla() {
        tablaBody.innerHTML = "";
        adatok.forEach((adat, torol) => {
          let helyszin = "";
          if (adat.helyszin === "50000")
            helyszin = "Németország";
          else if (adat.helyszin === "80000")
            helyszin = "Franciaország";
          else if (adat.helyszin === "120000")
            helyszin = "Egyiptom";
          else if (adat.helyszin === "150000")
            helyszin = "Thaiföld";


          const row = `
            <tr class="border-bottom border-dark">
              <td>${adat.nev}</td>
              <td>${helyszin}</td>
              <td>${adat.idopont}</td>
              <td>${adat.szemelyekSzama}</td>
              <td>${adat.vegosszeg}</td>
              <td><button class="btn btn-danger btn-sm" onclick="torles(${torol})">Törlés</button></td>
            </tr>`;
          tablaBody.insertAdjacentHTML('beforeend', row);
        });
      }

      function torles(torol) {
        if (!confirm('Biztosan törli ezt a bejegyzést?')) return;
        adatok.splice(torol, 1);
        localStorage.setItem('foglas', JSON.stringify(adatok));
        renderTabla();
      }

      renderTabla();
    </script>
</body>

</html>
